[mod]
id          = "yog-pipes"
name        = "Yog Pipes"
version     = "0.1.0"
description = "Item and fluid transport pipes for Yog mods — like Forge's pipe systems. Transfer items, fluids, and energy between inventories."
authors     = ["Yog Team"]
license     = "AGPL-3.0-only"

[dependencies]

[run.fabric-1.21.1]
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.fabric-1.20.1]
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]

[run.forge-1.21.1]
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/forge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.forge-1.20.1]
export_dir = "../Yog-Mod-Loader/forge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/forge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]

[run.neoforge-1.21.1]
export_dir = "../Yog-Mod-Loader/neoforge/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/neoforge"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.neoforge-1.20.1]
export_dir = "../Yog-Mod-Loader/neoforge/run/yog-mods"
