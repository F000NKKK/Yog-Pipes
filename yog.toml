[mod]
id          = "yog-pipes"
name        = "Yog Pipes"
version     = "0.3.0"
description = "Universal bridge framework for Yog mods — transfer items, fluids, signals, and any energy type between blocks. Built-in signal propagation lets blocks communicate through the pipe network. Extensible energy system supports Yog Flux (YF), Redstone Flux (RF), Forge Energy (FE), EU, and custom types."
authors     = ["Yog Team"]
license     = "AGPL-3.0-only"

[dependencies]

[run.fabric-1.21.1]
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.21.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"]

[run.fabric-1.20.1]
export_dir = "../Yog-Mod-Loader/fabric/run/yog-mods"
command    = "./gradlew"
args       = ["runClient", "-Pminecraft_version=1.20.1"]
cwd        = "../Yog-Mod-Loader/fabric"
env        = ["JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"]

